{{- $pagefindPath := "/pagefind/" | relURL -}}
<link rel="stylesheet" href="{{ "/pagefind/pagefind-component-ui.css" | relURL }}">

<div class="er-pagefind-search flex mx-4 relative" data-pagefind-ignore>
  <pagefind-config
    bundle-path="{{ $pagefindPath }}"
    base-url="{{ "" | relURL }}"
    excerpt-length="24"
  ></pagefind-config>

  <pagefind-modal-trigger
    placeholder="{{ T "search" }}"
    shortcut="mod+k"
  ></pagefind-modal-trigger>

  <pagefind-modal reset-on-close>
    <pagefind-modal-header>
      <pagefind-input
        placeholder="{{ T "searchPlaceholder" }}"
        debounce="150"
        autofocus
      ></pagefind-input>
    </pagefind-modal-header>

    <pagefind-modal-body>
      <pagefind-summary default-message=""></pagefind-summary>
      <pagefind-results max-results="5" hide-sub-results>
        <script type="text/pagefind-template">
          {{ `<li class="pf-result er-search-result">
  <a class="pf-result-card er-search-result-card pf-result-link" href="{{ meta.url | default(url) | safeUrl }}">
    <span class="er-search-result-heading">
      {{#if eq(meta.type, "note")}}
      <svg xmlns="http://www.w3.org/2000/svg" class="er-search-result-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <path d="M9 4h6a2 2 0 0 1 2 2v14l-5 -3l-5 3v-14a2 2 0 0 1 2 -2"></path>
      </svg>
      {{/if}}
      {{#if eq(meta.type, "blog")}}
      <svg xmlns="http://www.w3.org/2000/svg" class="er-search-result-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <path d="M3 3m0 2a2 2 0 0 1 2 -2h14a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2z"></path>
        <path d="M9 13h-2"></path>
        <path d="M13 10h-6"></path>
        <path d="M11 7h-4"></path>
      </svg>
      {{/if}}
      {{#if eq(meta.type, "project")}}
      <svg xmlns="http://www.w3.org/2000/svg" class="er-search-result-icon" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <path d="M3 21h4l13 -13a1.5 1.5 0 0 0 -4 -4l-13 13v4"></path>
        <path d="M14.5 5.5l4 4"></path>
        <path d="M12 8l-5 -5l-4 4l5 5"></path>
        <path d="M7 8l-1.5 1.5"></path>
        <path d="M16 12l5 5l-4 4l-5 -5"></path>
        <path d="M16 17l-1.5 1.5"></path>
      </svg>
      {{/if}}
      <span class="pf-result-title er-search-result-title">{{ meta.title }}</span>
    </span>
    {{#if excerpt}}
    <span class="pf-result-excerpt er-search-result-excerpt">{{+ excerpt +}}</span>
    {{/if}}
  </a>
</li>` | safeHTML }}
        </script>
        <script type="text/pagefind-template" data-template="placeholder">
          {{ `<li class="pf-result er-search-result" aria-hidden="true">
  <div class="pf-result-card er-search-result-card">
    <span class="pf-result-title pf-skeleton pf-skeleton-title er-search-placeholder-title"></span>
    <span class="pf-result-excerpt pf-skeleton pf-skeleton-excerpt er-search-placeholder-excerpt"></span>
  </div>
</li>` | safeHTML }}
        </script>
      </pagefind-results>
    </pagefind-modal-body>

    <pagefind-modal-footer>
      <pagefind-keyboard-hints></pagefind-keyboard-hints>
    </pagefind-modal-footer>
  </pagefind-modal>
</div>

<style>
  .er-pagefind-search {
    --pf-text: var(--color-body-text);
    --pf-text-secondary: var(--color-neutral-accent);
    --pf-text-muted: var(--color-body-text);
    --pf-background: var(--color-background);
    --pf-border: var(--color-border);
    --pf-border-focus: var(--color-main-light);
    --pf-hover: var(--color-border);
    --pf-mark: var(--color-main);
    --pf-skeleton: var(--color-background-alt);
    --pf-skeleton-shine: var(--color-border);
    --pf-outline-focus: var(--color-main-light);
    --pf-font: var(--font-sans);
    --pf-input-height: 36px;
    --pf-input-font-size: 16px;
    --pf-summary-font-size: 12px;
    --pf-result-title-font-size: 16px;
    --pf-result-excerpt-font-size: 12px;
    --pf-results-gap: 0;
    --pf-border-radius: 4px;
    --pf-modal-backdrop: rgb(0 0 0 / 0.5);
    --pf-modal-max-width: 48rem;
    --pf-modal-max-height: min(80dvh, 42rem);
    --pf-modal-top: 5rem;
  }

  .er-pagefind-search .pf-trigger-btn {
    height: auto !important;
    gap: 0.75rem !important;
    justify-content: space-between !important;
    padding: 0.375rem 0.75rem !important;
    background: var(--color-background-alt) !important;
    border-color: var(--color-border) !important;
    border-radius: 0.25rem !important;
    color: var(--color-body-text) !important;
    font-family: var(--font-sans) !important;
    font-size: 0.875rem !important;
    line-height: 1.25rem !important;
  }

  .er-pagefind-search .pf-trigger-btn:hover {
    border-color: var(--color-background-alt) !important;
  }

  .er-pagefind-search .pf-trigger-icon {
    width: 1rem !important;
    height: 1rem !important;
    background: var(--color-body-text) !important;
  }

  .er-pagefind-search .pf-trigger-text {
    color: var(--color-body-text) !important;
  }

  .er-pagefind-search .pf-trigger-shortcut {
    gap: 0.25rem !important;
  }

  .er-pagefind-search .pf-trigger-key,
  .er-pagefind-search .pf-keyboard-key {
    min-width: auto !important;
    height: auto !important;
    padding: 0.125rem 0.375rem !important;
    border: 1px solid var(--color-border) !important;
    border-radius: 0.25rem !important;
    background: var(--color-background-alt) !important;
    color: var(--color-body-text) !important;
    font-size: 0.75rem !important;
    font-weight: 600 !important;
    line-height: 1rem !important;
  }

  .er-pagefind-search dialog.pf-modal {
    border-radius: 0.75rem !important;
    box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25) !important;
    /* Clip the rounded shell so child borders end at the curve
       instead of bleeding past it. */
    overflow: hidden !important;
  }

  .er-pagefind-search pagefind-modal-header,
  .er-pagefind-search .pf-modal-header {
    padding: 0 !important;
    border-bottom-color: var(--color-border) !important;
  }

  .er-pagefind-search pagefind-modal-header .pf-input {
    height: 3rem !important;
    color: var(--color-body-text) !important;
    font-size: 0.875rem !important;
  }

  .er-pagefind-search pagefind-modal-header .pf-input::placeholder {
    color: var(--color-main) !important;
  }

  /* Suppress pagefind's curved focus ring around the modal input. The
     modal itself is the focus container, so the input doesn't need a
     second ring that visually competes with the divider below. */
  .er-pagefind-search pagefind-modal-header .pf-input:focus,
  .er-pagefind-search pagefind-modal-header .pf-input:focus-visible {
    outline: none !important;
    border-color: transparent !important;
    box-shadow: none !important;
  }

  .er-pagefind-search pagefind-modal-body,
  .er-pagefind-search .pf-modal-body {
    max-height: 36rem !important;
    padding: 0 !important;
  }

  .er-pagefind-search .pf-summary {
    margin: 0 !important;
    padding: 0.5rem 1rem !important;
    border-bottom: 1px solid var(--color-border) !important;
    color: var(--color-neutral-accent) !important;
    font-size: 0.75rem !important;
  }

  .er-pagefind-search .pf-summary:empty {
    display: none !important;
  }

  .er-pagefind-search .pf-results {
    max-height: 36rem !important;
    margin: 0 !important;
    padding: 0 !important;
    list-style: none !important;
  }

  .er-pagefind-search .er-search-result {
    margin: 0 !important;
    list-style: none !important;
  }

  .er-pagefind-search .er-search-result-card {
    display: flex !important;
    flex-direction: column !important;
    gap: 0.5rem !important;
    width: 100% !important;
    padding: 1rem !important;
    border: 0 !important;
    border-radius: 0 !important;
    background: transparent !important;
    color: var(--color-heading-text) !important;
    text-decoration: none !important;
  }

  .er-pagefind-search .er-search-result-card:hover,
  .er-pagefind-search .er-search-result-card:focus,
  .er-pagefind-search .er-search-result-card:focus-visible,
  .er-pagefind-search .er-search-result-card[data-pf-selected] {
    background: var(--color-border) !important;
    color: var(--color-heading-text) !important;
  }

  .er-pagefind-search .er-search-result-heading {
    display: flex !important;
    align-items: center !important;
    gap: 0.5rem !important;
  }

  .er-pagefind-search .er-search-result-icon {
    width: 1.5rem !important;
    height: 1.5rem !important;
    flex: 0 0 1.5rem !important;
  }

  .er-pagefind-search .er-search-result-title {
    margin: 0 !important;
    color: var(--color-heading-text) !important;
    font-weight: 600 !important;
    line-height: 1.5rem !important;
  }

  .er-pagefind-search .er-search-result-excerpt {
    display: block !important;
    margin: 0 !important;
    padding-left: 2rem !important;
    color: var(--color-neutral-accent) !important;
    line-height: 1rem !important;
  }

  .er-pagefind-search .er-search-result-excerpt mark {
    background: transparent !important;
    color: var(--color-main) !important;
    font-weight: 600 !important;
  }

  .er-pagefind-search pagefind-modal-footer,
  .er-pagefind-search .pf-modal-footer {
    padding: 0.75rem 1rem !important;
    border-top-color: var(--color-border) !important;
    background: var(--color-background) !important;
    color: var(--color-neutral-accent) !important;
  }

  @media (max-width: 767px) {
    .er-pagefind-search .pf-trigger-shortcut {
      display: none !important;
    }
  }
</style>

<script type="module" src="{{ "/pagefind/pagefind-component-ui.js" | relURL }}"></script>

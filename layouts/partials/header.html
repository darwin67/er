<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta content='text/html; charset=utf-8' http-equiv='content-type' />
<meta data-pagefind-meta="title[content]" content="{{ .Title }}" />
<meta data-pagefind-meta="summary[content]" content="{{ .Summary | plainify }}" />
<meta data-pagefind-meta="type[content]" content="{{ .Type }}" />

<script>
  document.documentElement.setAttribute('data-palette', '{{ .Site.Params.palette | default "clay" }}');
  (function () {
    try {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) { /* localStorage unavailable */ }
  })();
  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    try { localStorage.setItem('theme', next); } catch (e) { /* ignore */ }
  }
</script>

<link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:400,600" rel="stylesheet">

<!-- CSS -->
{{- $main := resources.Get "css/main.css" -}}
{{- $custom := resources.Get "css/custom.css" -}}
{{- $css := slice $main $custom | resources.Concat "css/bundle.css" | resources.Minify -}}
<link rel="stylesheet" href="{{- $css.RelPermalink -}}" />

<!-- Icon -->
<link rel="icon"
{{ if .Site.Params.favicon }}
  href="{{ .Site.Params.favicon | relURL }}"
{{ else }}
  href='{{ "/favicon.ico" | relURL }}'
{{ end }}
type="image/x-icon"/>

<link href='{{ "/feed.xml" | relLangURL }}' rel="alternate" type="application/atom+xml" title="{{ .Site.Title }}" />

{{ hugo.Generator }}
{{ partial "open_graph.html" . }}

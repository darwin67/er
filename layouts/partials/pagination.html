{{ if gt .Paginator.TotalPages 1 }}
<div class="text-center block lg:fixed lg:bottom-2 lg:right-2 mb-3 lg:mb-0" data-pagefind-ignore>
{{ partial "back-to-top.html" . }}<br>
<p class="mb-0 mt-2">{{ T "page" }} {{ .Paginator.PageNumber }} {{ T "of" }} {{ .Paginator.TotalPages }} <br>
  {{ if .Paginator.HasNext }}<a href="{{ .Paginator.Next.URL | relURL }}" class="no-underline text-inherit hover:text-[var(--color-neutral-accent)]">{{ T "olderPosts" }}</a>{{ end }}
  {{ if .Paginator.HasPrev }}<a href="{{ .Paginator.Prev.URL | relURL }}" class="no-underline text-inherit hover:text-[var(--color-neutral-accent)]">{{ T "newerPosts" }}</a>{{ end }}
</p>
</div>
{{ end }}
